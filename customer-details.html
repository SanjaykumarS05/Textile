<!doctype html>
<html data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Customer Details</title>
    <script>
      (() => {
        const theme = localStorage.getItem('app-theme') || 'dark';
        document.documentElement.setAttribute('data-theme', theme);
        document.documentElement.style.backgroundColor = theme === 'light' ? '#f6f8fb' : '#0c111c';
        document.documentElement.style.colorScheme = theme;
      })();
    </script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="customer-details">
    <div class="app">
      <div data-sidebar-root></div>
      <main class="content">
        <header class="page-header">
          <h1 class="page-title">Customer Details</h1>
          <button class="theme-toggle" type="button" data-theme-toggle>
            <span class="material-symbols-outlined">routine</span>
          </button>
        </header>
        <div class="notice"></div>

        <section class="card pad">
          <h3 id="customerName">Customer</h3>
          <div class="list">
            <div><span class="tag">Phone</span> <span id="customerPhone"></span></div>
            <div><span class="tag">Email</span> <span id="customerEmail"></span></div>
            <div><span class="tag">Address</span> <span id="customerAddress"></span></div>
            <div><span class="tag">GST Number:</span> <span id="GSTNumber"></span></div>
            <div><span class="tag">Joined</span> <span id="customerJoined"></span></div>
          </div>
        </section>

        <section class="card pad">
          <h3>Orders</h3>
          <table class="table">
            <thead>
              <tr>
                <th>Order</th>
                <th>Date</th>
                <th>Total</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="customerOrdersBody"></tbody>
          </table>
        </section>
      </main>
    </div>
    <script type="module" src="src/app.js"></script>
  </body>
</html>
