<!doctype html>
<html data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Customer List</title>
    <script>
      (() => {
        const theme = localStorage.getItem('app-theme') || 'dark';
        document.documentElement.setAttribute('data-theme', theme);
        document.documentElement.style.backgroundColor = theme === 'light' ? '#f6f8fb' : '#0c111c';
        document.documentElement.style.colorScheme = theme;
      })();
    </script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="customers-list">
    <div class="app">
      <div data-sidebar-root></div>
      <main class="content">
        <header class="page-header">
          <h1 class="page-title">Customer List</h1>
          <button class="theme-toggle" type="button" data-theme-toggle>
            <span class="material-symbols-outlined">routine</span>
          </button>
        </header>
        <div class="notice"></div>

        <section class="card pad">
          <div class="toolbar">
            <h3 style="margin:0;">Customer List</h3>
            <div class="list-search">
              <input id="customerSearchInput" class="input" type="text" placeholder="Search by Name or Phone" />
              <button id="customerSearchBtn" class="btn btn-sm" type="button" aria-label="Search customers">
                <span class="material-symbols-outlined">search</span>
              </button>
            </div>
          </div>
          <div id="customersCardList" class="customers-grid"></div>
        </section>
      </main>
    </div>
    <script type="module" src="src/app.js"></script>
  </body>
</html>
