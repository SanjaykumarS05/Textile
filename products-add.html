<!doctype html>
<html data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add Product</title>
    <script>
      (() => {
        const theme = localStorage.getItem('app-theme') || 'dark';
        document.documentElement.setAttribute('data-theme', theme);
        document.documentElement.style.backgroundColor = theme === 'light' ? '#f6f8fb' : '#0c111c';
        document.documentElement.style.colorScheme = theme;
      })();
    </script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="products-add">
    <div class="app">
      <div data-sidebar-root></div>
      <main class="content">
        <header class="page-header">
          <h1 class="page-title">Add Product</h1>
          <button class="theme-toggle" type="button" data-theme-toggle>
            <span class="material-symbols-outlined">routine</span>
          </button>
        </header>
        <div class="notice"></div>

        <section class="card pad">
          <h3>Add / Edit Product</h3>
          <form id="productForm" class="stack">
            <input type="hidden" id="productId" />
            <div class="form-grid">
              <label>
                Name <span style="color:red">*</span>
                <input id="productName" class="input" type="text" />
              </label>
              <label>
                SKU <span style="color:red">*</span>
                <input id="productSku" class="input" type="text" />
              </label>
              <label>
                Available Unit <span style="color:red">*</span>
                <input id="productUnit" class="input" type="number" placeholder="1000" min="0" step="0.01" />
              </label>
              <label>
                Unit<span style="color:red">*</span>
                <select id="productUnitSelect" class="select">
                  <option value="meter">Meter</option>
                  <option value="pcs">Pieces</option>
                  <option value="kgs">Kgs</option>
                </select>
              </label>
              <label id="productAddUnitWrap" hidden>
                Add Unit
                <input id="productAddUnit" class="input" type="number" min="0" step="0.01" value="0" />
              </label>
              <label>
                Price <span style="color:red">*</span>
                <input id="productPrice" class="input" type="number" step="0.01" />
              </label>
            </div>
            <div class="toolbar">
              <button class="btn" type="submit">Save Product</button>
              <a class="btn btn-outline" href="products.html">Go to Product List</a>
            </div>
          </form>
        </section>
      </main>
    </div>
    <script type="module" src="src/app.js"></script>
  </body>
</html>
