<!doctype html>
<html data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Order</title>
    <script>
      (() => {
        const theme = localStorage.getItem('app-theme') || 'dark';
        document.documentElement.setAttribute('data-theme', theme);
        document.documentElement.style.backgroundColor = theme === 'light' ? '#f6f8fb' : '#0c111c';
        document.documentElement.style.colorScheme = theme;
      })();
    </script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="orders-create">
    <div class="app">
      <div data-sidebar-root></div>
      <main class="content">
        <header class="page-header">
          <h1 class="page-title">Create Order</h1>
          <button class="theme-toggle" type="button" data-theme-toggle>
            <span class="material-symbols-outlined">routine</span>
          </button>
        </header>
        <div class="notice"></div>

        <section class="card pad no-print">
          <h3>Create New Order</h3>
          <form id="orderForm" class="stack">
            <div class="form-grid">
              <label>
                Customer <span style="color:red">*</span>
                <select id="orderCustomer" class="select"></select>
              </label>
              <label>
                Order Date <span style="color:red">*</span>
                <input id="orderDate" class="input" type="date" />
              </label>
              <label>
                Status
                <select id="orderStatus" class="select"></select>
              </label>
              <label>
                Notes
                <input id="orderNotes" class="input" type="text" placeholder="Optional notes" />
              </label>
            </div>

            <div class="card pad">
              <h4>Add Items</h4>
              <div class="form-grid">
                <label>
                  Product <span style="color:red">*</span>
                  <select id="orderItemProduct" class="select"></select>
                </label>
                <label>
                  Unit <span style="color:red">*</span>
                  <input id="orderItemUnit" class="input" type="number" min="0" step="0.01" />
                </label>
                <label>
                  Unit Price <span style="color:red">*</span>
                  <input id="orderItemPrice" class="input" type="number" min="0" step="0.01" />
                </label>
                <div style="display:flex; align-items:flex-end;">
                  <button class="btn" type="button" id="addItemBtn">Add Item</button>
                </div>
              </div>
              <table class="table">
                <thead>
                  <tr>
                    <th>Product</th>
                    <th>Unit</th>
                    <th>Price</th>
                    <th>Line Total</th>
                    <th>Action</th>
                  </tr>
                </thead>
                <tbody id="orderItemsBody"></tbody>
              </table>
              <p class="muted">Total: <strong id="orderTotal">&#8377;0</strong></p>
            </div>

            <button class="btn" type="submit">Save Order</button>
          </form>
        </section>

      </main>
    </div>
    <script>
      document.getElementById("orderDate").valueAsDate = new Date();
    </script>
    <script type="module" src="src/app.js"></script>
  </body>
</html>
